<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El viaje de Kyrita — Eurotrip 2025</title>
<style>
  :root {
    --bg: #F3F3F3;
    --bg-secondary: #EAEAEA;
    --text: #000000;
    --text-secondary: #B8B8B8;
    --btn-active-bg: #0D0D0D;
    --btn-active-text: #FFFFFF;
    --btn-border: #000000;
    --btn-text: #000000;
    --lightbox-bg: rgba(0,0,0,0.92);
    --glass-bg: rgba(243,243,243,0.72);
    --glass-border: rgba(255,255,255,0.4);
    --glass-shadow: rgba(0,0,0,0.06);
    --map-land: #E0E0E0;
    --map-visited: #D0D0D0;
    --map-water: #F3F3F3;
    --pin-active: #000000;
    --pin-inactive: #CCCCCC;
    --route-color: #000000;
  }
  html.dark {
    --bg: #0D0D0D;
    --bg-secondary: #1A1A1A;
    --text: #FFFFFF;
    --text-secondary: #555555;
    --btn-active-bg: #FFFFFF;
    --btn-active-text: #0D0D0D;
    --btn-border: rgba(255,255,255,0.3);
    --btn-text: #FFFFFF;
    --lightbox-bg: rgba(0,0,0,0.96);
    --glass-bg: rgba(13,13,13,0.65);
    --glass-border: rgba(255,255,255,0.08);
    --glass-shadow: rgba(0,0,0,0.3);
    --map-land: #1F1F1F;
    --map-visited: #2A2A2A;
    --map-water: #0D0D0D;
    --pin-active: #FFFFFF;
    --pin-inactive: #444444;
    --route-color: #FFFFFF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    transition: background 0.6s cubic-bezier(0.4,0,0.2,1), color 0.6s cubic-bezier(0.4,0,0.2,1);
    overflow-x: hidden;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* ─── HEADER (removed, now in glass bar) ─── */

  /* ─── JOURNEY MAP (Globe) ─── */
  .journey-map {
    padding: 40px 54px 20px 54px;
    position: relative;
    overflow: visible;
    transition: max-height 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease, padding 0.5s ease;
    opacity: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .journey-map.collapsed {
    max-height: 0 !important;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
    overflow: hidden;
  }

  .globe-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    max-width: 620px;
  }

  .globe {
    width: 580px;
    height: 580px;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle at 40% 35%, #F0EDE8 0%, #E0DCD5 40%, #D2CEC6 70%, #C8C4BC 100%);
    box-shadow:
      inset -25px -25px 50px rgba(0,0,0,0.06),
      inset 15px 15px 30px rgba(255,255,255,0.5),
      0 20px 60px rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
  .globe::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.45) 0%, transparent 45%),
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 2;
  }
  .globe svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .globe .dot-land {
    fill: #B8B4AC;
    transition: fill 0.5s ease;
  }
  .globe .dot-land-visited {
    fill: #6B6760;
    transition: fill 0.5s ease;
  }

  html.dark .globe {
    background: radial-gradient(circle at 40% 35%, #2A2826 0%, #222120 40%, #1A1918 70%, #141312 100%);
    box-shadow:
      inset -25px -25px 50px rgba(0,0,0,0.3),
      inset 15px 15px 30px rgba(255,255,255,0.02),
      0 20px 60px rgba(0,0,0,0.4);
  }
  html.dark .globe .dot-land { fill: #4A4744; }
  html.dark .globe .dot-land-visited { fill: #9A9690; }

  /* Globe pins */
  .globe-pin {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    z-index: 3;
    transition: transform 0.3s ease, opacity 0.3s ease;
    transform: translate(-50%, -50%);
  }
  .globe-pin:hover { transform: translate(-50%, -50%) scale(1.15); }
  .globe-pin.inactive { opacity: 0.35; }
  .globe-pin-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3A3A38;
    flex-shrink: 0;
  }
  .globe-pin-label {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #3A3A38;
    color: white;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    line-height: 1;
  }
  .globe-pin-icon {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #5A5A58;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    flex-shrink: 0;
  }
  .globe-pin-count {
    font-variant-numeric: tabular-nums;
  }

  html.dark .globe-pin-dot { background: #D0D0CE; }
  html.dark .globe-pin-label { background: #D0D0CE; color: #1A1A18; }
  html.dark .globe-pin-icon { background: #A0A09E; }

  /* Route line inside SVG */
  .map-route {
    fill: none;
    stroke: #4A4640;
    stroke-width: 1.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    opacity: 0.3;
  }
  html.dark .map-route { stroke: #A09A90; }
  .map-route.animate {
    animation: drawRoute 2.5s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes drawRoute {
    to { stroke-dashoffset: 0; }
  }

  /* Map popup */
  .map-popup {
    position: absolute;
    width: 220px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    padding: 0;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px) scale(0.95);
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    z-index: 50;
  }
  .map-popup.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }
  .map-popup-img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
  }
  .map-popup-body {
    padding: 12px 14px;
  }
  .map-popup-city {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.02em;
    color: var(--text);
    transition: color 0.5s ease;
  }
  .map-popup-date {
    font-weight: 300;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: color 0.5s ease;
  }
  .map-popup-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--btn-active-bg);
    color: var(--btn-active-text);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
  }
  .map-popup-btn:hover { opacity: 0.8; }

  /* Map tooltip */
  .map-tooltip {
    position: absolute;
    padding: 4px 10px;
    background: var(--btn-active-bg);
    color: var(--btn-active-text);
    font-size: 11px;
    font-weight: 500;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.25s ease;
    white-space: nowrap;
    z-index: 40;
  }
  .map-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── FLOATING GLASS BAR ─── */
  .months-float {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    padding: 16px 54px;
    pointer-events: none;
  }
  .months-glass {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px;
    border-radius: 38px;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 4px 30px var(--glass-shadow), 0 1px 3px var(--glass-shadow);
    pointer-events: all;
    transition: background 0.6s ease, border 0.6s ease, box-shadow 0.6s ease;
  }
  /* Profile section in glass bar */
  .bar-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 8px 0 4px;
    flex-shrink: 0;
  }
  .bar-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .bar-titles {
    display: flex;
    align-items: center;
    gap: 12px;
    white-space: nowrap;
  }
  .bar-title-main {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--text);
    transition: color 0.5s ease;
  }
  .bar-title-sep {
    width: 1px;
    height: 18px;
    background: var(--text-secondary);
    flex-shrink: 0;
  }
  .bar-title-sub {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--text-secondary);
    transition: color 0.5s ease;
  }
  .month-btn {
    padding: 0 20px;
    height: 42px;
    border-radius: 24px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.45s cubic-bezier(0.4,0,0.2,1);
    text-transform: uppercase;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .month-btn:hover { color: var(--text); }
  .month-btn.active {
    background: var(--btn-active-bg);
    color: var(--btn-active-text);
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .month-icon { display: inline-flex; align-items: center; vertical-align: middle; }
  .month-icon svg { display: block; }
  .glass-sep {
    width: 1px;
    height: 28px;
    background: var(--glass-border);
    margin: 0 4px;
    flex-shrink: 0;
    transition: background 0.5s ease;
  }
  .glass-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
  }
  .glass-btn:hover {
    color: var(--text);
    background: rgba(128,128,128,0.1);
  }
  .glass-btn.active-toggle {
    color: var(--text);
  }
  .glass-btn svg {
    width: 18px; height: 18px;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ─── CITIES FLOW ─── */
  .cities-flow {
    padding: 30px 54px 0 54px;
  }
  .city-row { overflow: hidden; }
  .city-header {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    cursor: pointer;
    padding: 4px 0;
  }
  .city-name {
    font-weight: 700;
    font-size: 78px;
    letter-spacing: -0.05em;
    color: var(--text-secondary);
    transition: color 0.5s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    user-select: none;
    line-height: 1.05;
  }
  .city-name:hover { color: var(--text); }
  .city-name.active { color: var(--text); }
  .city-separator {
    font-weight: 200;
    font-size: 78px;
    letter-spacing: -0.05em;
    color: var(--text-secondary);
    padding: 0 12px;
    user-select: none;
    transition: color 0.5s ease;
    line-height: 1.05;
  }

  /* ─── CITY INFO (mini-map + fun facts) ─── */
  .city-info {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 20px;
    padding: 16px 0 20px 0;
    border-bottom: 1px solid var(--glass-border);
    margin-bottom: 16px;
    transition: border-color 0.5s ease;
  }
  .city-info-map {
    flex-shrink: 0;
    width: 110px;
    height: 110px;
    border-radius: 16px;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.5s ease;
  }
  .city-info-map svg {
    width: 96px;
    height: 96px;
  }
  html.dark .city-info-map svg path[fill="#D0CEC8"] { fill: #3A3836; }
  html.dark .city-info-map svg path[fill="#1A1A1A"] { fill: #E0E0DE; }
  .city-info-text {
    flex: 1;
    min-width: 0;
  }
  .city-info-country {
    font-weight: 700;
    font-size: 35px;
    letter-spacing: -0.05em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 2px;
    transition: color 0.5s ease;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .city-info-facts {
    font-weight: 700;
    font-size: 21px;
    letter-spacing: -0.05em;
    line-height: 1.35;
    color: #B6B6B6;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    transition: color 0.5s ease;
  }

  /* ─── INLINE GRID ─── */
  .city-grid-wrapper {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease, padding 0.5s ease;
    opacity: 0;
    padding: 0;
  }
  .city-row.expanded .city-grid-wrapper {
    opacity: 1;
    padding: 20px 0 30px 0;
  }
  .city-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .grid-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.94) translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    background: var(--bg-secondary);
  }
  .grid-item.revealed {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  .grid-item:hover { transform: scale(1.03); z-index: 2; }
  .grid-item:hover::after { opacity: 1; }
  .grid-item::after {
    content: '';
    position: absolute; inset: 0;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .grid-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 6px;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .grid-item:hover img { transform: scale(1.06); }
  .video-badge {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 48px; height: 48px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    transition: all 0.4s ease;
  }
  .grid-item:hover .video-badge {
    background: rgba(0,0,0,0.65);
    transform: translate(-50%,-50%) scale(1.1);
  }
  .video-badge::after {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 8px 0 8px 14px;
    border-color: transparent transparent transparent white;
    margin-left: 3px;
  }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--lightbox-bg);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s cubic-bezier(0.4,0,0.2,1);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox-content {
    max-width: 90vw; max-height: 85vh;
    transform: scale(0.92);
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    border-radius: 8px; overflow: hidden;
  }
  .lightbox.open .lightbox-content { transform: scale(1); }
  .lightbox-content img {
    max-width: 90vw; max-height: 85vh;
    object-fit: contain; display: block; border-radius: 8px;
  }
  .lightbox-content iframe {
    width: 80vw; height: 80vh;
    border: none; border-radius: 8px;
  }
  .lightbox-close {
    position: absolute; top: 24px; right: 32px;
    width: 44px; height: 44px;
    border-radius: 50%; border: none;
    background: rgba(255,255,255,0.1);
    color: white; font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.25); transform: rotate(90deg); }
  .lightbox-nav {
    position: absolute; top: 50%;
    transform: translateY(-50%);
    width: 56px; height: 56px;
    border-radius: 50%; border: none;
    background: rgba(255,255,255,0.08);
    color: white; font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
  .lightbox-prev { left: 24px; }
  .lightbox-next { right: 24px; }
  .lightbox-counter {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 13px; font-weight: 300; letter-spacing: 0.1em;
  }

  /* ─── SHIMMER ─── */
  .grid-item.loading-placeholder {
    background: var(--bg-secondary);
    animation: shimmer 1.5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:0.8} }

  /* ─── RESPONSIVE ─── */
  @media (max-width:1200px) {
    .city-name,.city-separator { font-size:56px; }
    .city-grid { grid-template-columns: repeat(4,1fr); }
    .globe { width: 460px; height: 460px; }
  }
  @media (max-width:768px) {
    .cities-flow { padding-left:24px; padding-right:24px; }
    .months-float { padding-left:12px; padding-right:12px; }
    .journey-map { padding-left:24px; padding-right:24px; }
    .city-name,.city-separator { font-size:36px; }
    .city-grid { grid-template-columns: repeat(3,1fr); }
    .month-btn { padding:0 16px; height:40px; font-size:11px; }
    .months-glass { padding:4px; border-radius:30px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .bar-title-main { font-size:12px; }
    .bar-title-sub { font-size:12px; }
    .bar-avatar { width:32px; height:32px; }
    .bar-profile { gap:8px; }
    .city-info { flex-direction: column; }
    .globe { width: 320px; height: 320px; }
    .globe-pin-label { font-size: 9px; padding: 3px 7px; }
    .globe-pin-dot { width: 6px; height: 6px; }
  }
  @media (max-width:480px) {
    .globe { width: 260px; height: 260px; }
    .bar-titles { display:none; }
  }
</style>
</head>
<body>

<!-- Floating glass bar (now at top, first thing visible) -->
<div class="months-float" id="monthsFloat">
  <div class="months-glass" id="monthsGlass"></div>
</div>

<!-- Journey Map (Globe) -->
<div class="journey-map collapsed" id="journeyMap">
  <div class="globe-container" id="globeContainer">
    <div class="globe" id="globe">
      <svg viewBox="350 100 380 380" xmlns="http://www.w3.org/2000/svg">
        <!-- Dot matrix continents rendered by JS -->
        <g id="dotMatrix"></g>
        <!-- Route line -->
        <polyline id="routeLine" class="map-route" points=""/>
      </svg>
      <!-- Pins rendered by JS (HTML divs over the globe) -->
      <div id="mapPins"></div>
    </div>
  </div>
  <!-- Popup container -->
  <div class="map-popup" id="mapPopup">
    <img class="map-popup-img" id="popupImg" src="" alt="">
    <div class="map-popup-body">
      <div class="map-popup-city" id="popupCity"></div>
      <div class="map-popup-date" id="popupDate"></div>
      <button class="map-popup-btn" id="popupBtn">Ver fotos</button>
    </div>
  </div>
  <!-- Tooltip -->
  <div class="map-tooltip" id="mapTooltip"></div>
</div>

<!-- Cities -->

function miniMapSVG(countryName) {
  let svg = `<svg viewBox="8 0 80 75" xmlns="http://www.w3.org/2000/svg">`;
  const gray = "#D0CEC8";
  const dark = "#1A1A1A";
  // Background countries
  EUROPE_PATHS.bg.forEach(d => { svg += `<path d="${d}" fill="${gray}" stroke="none"/>`; });
  // Visited countries
  Object.entries(EUROPE_PATHS).forEach(([k, v]) => {
    if (k === "bg") return;
    // Italia, Italia_s, Italia_si all highlight for Italia
    const baseCountry = k.replace(/_s$|_si$/,"");
    const isHighlighted = baseCountry === countryName ||
      (countryName === "Italia" && k.startsWith("Italia"));
    svg += `<path d="${v}" fill="${isHighlighted ? dark : gray}" stroke="none"/>`;
  });
  svg += `</svg>`;
  return svg;
}

function renderGlassBar() {
  $monthsGlass.innerHTML = "";

  // Profile section: avatar + titles
  const profile = document.createElement("div");
  profile.className = "bar-profile";
  profile.innerHTML = `
    <img class="bar-avatar" src="kyra.jpg" alt="Kyra">
    <div class="bar-titles">
      <span class="bar-title-main">El Viaje de Kyrita</span>
      <span class="bar-title-sep"></span>
      <span class="bar-title-sub">Eurotrip, @2025</span>
    </div>`;
  $monthsGlass.appendChild(profile);

  // Separator after profile
  const profSep = document.createElement("div");
  profSep.className = "glass-sep";
  $monthsGlass.appendChild(profSep);

  monthNames.forEach((m, i) => {
    const btn = document.createElement("button");
    btn.className = "month-btn" + (m === currentMonth ? " active" : "");
    btn.innerHTML = `<span class="month-icon">${MONTH_ICONS[m]||""}</span>${m}`;
    btn.addEventListener("click", () => {
      currentMonth = m;
      expandedCity = null;
      renderGlassBar();
      renderCities();
      renderMapPins();
    });
    $monthsGlass.appendChild(btn);
    if (i < monthNames.length - 1) {
      const sep = document.createElement("div");
      sep.className = "glass-sep";
      $monthsGlass.appendChild(sep);
    }
  });
  // Map toggle
  const sep2 = document.createElement("div");
  sep2.className = "glass-sep";
  $monthsGlass.appendChild(sep2);
  const mapBtn = document.createElement("button");
  mapBtn.className = "glass-btn" + (mapVisible ? " active-toggle" : "");
  mapBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>`;
  mapBtn.addEventListener("click", () => {
    mapVisible = !mapVisible;
    $journeyMap.classList.toggle("collapsed", !mapVisible);
    mapBtn.classList.toggle("active-toggle", mapVisible);
  });
  $monthsGlass.appendChild(mapBtn);
  // Theme toggle
  const themeBtn = document.createElement("button");
  themeBtn.className = "glass-btn";
  themeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  themeBtn.addEventListener("click", () => {
    document.documentElement.classList.toggle("dark");
    localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
    renderGlassBar();
  });
  $monthsGlass.appendChild(themeBtn);
}

function pointInPolygon(x, y, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i][0], yi = polygon[i][1];
    const xj = polygon[j][0], yj = polygon[j][1];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function renderDotMatrix() {
  const $dotMatrix = document.getElementById("dotMatrix");
  $dotMatrix.innerHTML = "";
  const DOT_R = 1.5;
  const SPACING = 4.5;
  const svgNS = "http://www.w3.org/2000/svg";

  // Generate grid of dots and test against polygons
  for (let x = 365; x <= 720; x += SPACING) {
    for (let y = 105; y <= 470; y += SPACING) {
      // Check if inside globe circle (center ~540, ~290, radius ~185)
      const dx = x - 540, dy = y - 290;
      if (dx*dx + dy*dy > 185*185) continue;

      let isVisited = false;
      let isLand = false;

      for (const poly of COUNTRIES.visited) {
        if (pointInPolygon(x, y, poly)) { isVisited = true; isLand = true; break; }
      }
      if (!isLand) {
        for (const poly of COUNTRIES.context) {
          if (pointInPolygon(x, y, poly)) { isLand = true; break; }
        }
      }

      if (isLand) {
        const c = document.createElementNS(svgNS, "circle");
        c.setAttribute("cx", x);
        c.setAttribute("cy", y);
        c.setAttribute("r", DOT_R);
        c.setAttribute("class", isVisited ? "dot-land-visited" : "dot-land");
        $dotMatrix.appendChild(c);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// MAP PINS + ROUTE (Globe version)
// ═══════════════════════════════════════════════════════════
function renderMapPins() {
  $mapPins.innerHTML = "";
  closeMapPopup();

  // Build route points for SVG polyline
  const pts = ROUTE_ORDER.map(r => {
    const info = CITY_INFO[r.city];
    return `${info.cx},${info.cy}`;
  }).join(" ");
  $routeLine.setAttribute("points", pts);
  $routeLine.classList.remove("animate");
  void $routeLine.offsetWidth;
  $routeLine.classList.add("animate");

  // Track which cities we've already placed a pin for (avoid duplicates like Amsterdam appearing twice)
  const placedCities = new Set();

  ROUTE_ORDER.forEach((r, i) => {
    const info = CITY_INFO[r.city];
    const pos = PIN_POSITIONS[r.city];
    if (!pos) return;

    // For duplicate cities (Amsterdam in Oct + Dec), show the one matching current month, or the first one
    if (placedCities.has(r.city)) return;
    placedCities.add(r.city);

    const isActive = r.month === currentMonth || 
      (DATA[currentMonth] && DATA[currentMonth][r.city]);

    // Count photos for this city across all months it appears
    let photoCount = 0;
    for (const month of Object.keys(DATA)) {
      if (DATA[month][r.city]) {
        photoCount += DATA[month][r.city].files.length;
      }
    }

    const pin = document.createElement("div");
    pin.className = "globe-pin" + (isActive ? "" : " inactive");
    pin.style.left = pos.left + "%";
    pin.style.top = pos.top + "%";
    pin.dataset.city = r.city;
    pin.dataset.month = r.month;

    pin.innerHTML = `
      <div class="globe-pin-dot"></div>
      <div class="globe-pin-label">
        <span class="globe-pin-icon">&#9679;</span>
        <span class="globe-pin-count">${photoCount}</span>
      </div>
    `;

    // Events
    pin.addEventListener("mouseenter", () => {
      const rect = pin.getBoundingClientRect();
      const mapRect = $journeyMap.getBoundingClientRect();
      $mapTooltip.textContent = r.city;
      $mapTooltip.style.left = (rect.left - mapRect.left + rect.width / 2) + "px";
      $mapTooltip.style.top = (rect.top - mapRect.top - 28) + "px";
      $mapTooltip.style.transform = "translateX(-50%) translateY(0)";
      $mapTooltip.classList.add("visible");
    });
    pin.addEventListener("mouseleave", () => {
      $mapTooltip.classList.remove("visible");
    });
    pin.addEventListener("click", (e) => {
      e.stopPropagation();
      // Find which month has this city
      let targetMonth = r.month;
      if (DATA[currentMonth] && DATA[currentMonth][r.city]) {
        targetMonth = currentMonth;
      }
      showMapPopup(r.city, targetMonth, pin);
    });

    $mapPins.appendChild(pin);
  });
}

function showMapPopup(city, month, pinEl) {
  $mapTooltip.classList.remove("visible");

  const cityData = DATA[month][city];
  if (!cityData) return;
  const firstImg = cityData.files.find(f => f.t === "I") || cityData.files[0];

  document.getElementById("popupImg").src = thumb(firstImg.id, 400);
  document.getElementById("popupCity").textContent = city;
  document.getElementById("popupDate").textContent = cityData.date;
  document.getElementById("popupBtn").onclick = () => {
    closeMapPopup();
    if (currentMonth !== month) {
      currentMonth = month;
      renderGlassBar();
      renderCities();
      renderMapPins();
    }
    setTimeout(() => {
      toggleCity(city);
      setTimeout(() => {
        const row = document.querySelector(`.city-row[data-city="${city}"]`);
        if (row) row.scrollIntoView({ behavior:"smooth", block:"start" });
      }, 200);
    }, 300);
  };

  const pinRect = pinEl.getBoundingClientRect();
  const mapRect = $journeyMap.getBoundingClientRect();
  const x = pinRect.left - mapRect.left + pinRect.width / 2;
  const y = pinRect.top - mapRect.top;

  $mapPopup.style.left = Math.min(Math.max(x - 110, 10), mapRect.width - 230) + "px";
  $mapPopup.style.top = Math.max(y - 200, 10) + "px";
  $mapPopup.classList.add("visible");
  activePopup = city;
}

function closeMapPopup() {
  $mapPopup.classList.remove("visible");
  activePopup = null;
}

document.addEventListener("click", (e) => {
  if (activePopup && !$mapPopup.contains(e.target)) closeMapPopup();
});

// ═══════════════════════════════════════════════════════════
// RENDER CITIES
// ═══════════════════════════════════════════════════════════
function renderCities() {
  $citiesFlow.style.opacity = "0";
  $citiesFlow.style.transform = "translateY(12px)";
  setTimeout(() => {
    $citiesFlow.innerHTML = "";
    const cities = Object.keys(DATA[currentMonth]);
    cities.forEach((city, i) => {
      const row = document.createElement("div");
      row.className = "city-row";
      row.dataset.city = city;
      const header = document.createElement("div");
      header.className = "city-header";
      const nameSpan = document.createElement("span");
      nameSpan.className = "city-name";
      nameSpan.textContent = city.toUpperCase();
      header.appendChild(nameSpan);
      if (i < cities.length - 1) {
        const sep = document.createElement("span");
        sep.className = "city-separator";
        sep.textContent = "/";
        header.appendChild(sep);
      }
      header.addEventListener("click", () => toggleCity(city));
      row.appendChild(header);
      const gridWrap = document.createElement("div");
      gridWrap.className = "city-grid-wrapper";
      // City info block
      const info = CITY_INFO[city];
      if (info) {
        const infoDiv = document.createElement("div");
        infoDiv.className = "city-info";
        infoDiv.innerHTML = `
          <div class="city-info-map">
            ${miniMapSVG(info.country)}
          </div>
          <div class="city-info-text">
            <div class="city-info-country">${info.country}</div>
            <div class="city-info-facts">${info.facts}</div>
          </div>`;
        gridWrap.appendChild(infoDiv);
      }
      const grid = document.createElement("div");
      grid.className = "city-grid";
      gridWrap.appendChild(grid);
      row.appendChild(gridWrap);
      $citiesFlow.appendChild(row);
    });
    requestAnimationFrame(() => {
      $citiesFlow.style.transition = "opacity 0.5s ease, transform 0.5s ease";
      $citiesFlow.style.opacity = "1";
      $citiesFlow.style.transform = "translateY(0)";
    });
    if (expandedCity && DATA[currentMonth][expandedCity]) {
      setTimeout(() => toggleCity(expandedCity), 100);
    }
  }, 250);
}

// ═══════════════════════════════════════════════════════════
// TOGGLE CITY
// ═══════════════════════════════════════════════════════════
function toggleCity(city) {
  const wasExpanded = expandedCity === city;
  if (expandedCity) {
    const oldRow = document.querySelector(`.city-row[data-city="${expandedCity}"]`);
    if (oldRow) {
      oldRow.classList.remove("expanded");
      const oldWrap = oldRow.querySelector(".city-grid-wrapper");
      oldWrap.style.maxHeight = oldWrap.scrollHeight + "px";
      requestAnimationFrame(() => { oldWrap.style.maxHeight = "0"; });
      oldRow.querySelector(".city-name").classList.remove("active");
    }
  }
  if (wasExpanded) { expandedCity = null; return; }
  expandedCity = city;
  const row = document.querySelector(`.city-row[data-city="${city}"]`);
  if (!row) return;
  row.classList.add("expanded");
  row.querySelector(".city-name").classList.add("active");
  const gridWrap = row.querySelector(".city-grid-wrapper");
  const grid = gridWrap.querySelector(".city-grid");
  if (grid.children.length === 0) {
    const files = DATA[currentMonth][city].files;
    files.forEach((file, idx) => {
      const div = document.createElement("div");
      div.className = "grid-item";
      const img = document.createElement("img");
      img.loading = "lazy"; img.alt = "";
      img.src = thumb(file.id, 800);
      img.onerror = function(){ this.style.display="none"; this.parentElement.classList.add("loading-placeholder"); };
      div.appendChild(img);
      if (file.t === "V") {
        const badge = document.createElement("div");
        badge.className = "video-badge";
        div.appendChild(badge);
      }
      div.addEventListener("click", () => openLightbox(files, idx));
      grid.appendChild(div);
    });
  }
  gridWrap.style.maxHeight = "0";
  requestAnimationFrame(() => {
    gridWrap.style.maxHeight = gridWrap.scrollHeight + 5000 + "px";
    const items = grid.querySelectorAll(".grid-item");
    items.forEach((item, idx) => {
      item.classList.remove("revealed");
      setTimeout(() => item.classList.add("revealed"), 30 * idx);
    });
  });
  setTimeout(() => { row.scrollIntoView({ behavior:"smooth", block:"start" }); }, 150);
}

// ═══════════════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════════════
function openLightbox(files, index) {
  lightboxFiles = files; lightboxIndex = index;
  showLightboxItem();
  $lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  $lightbox.classList.remove("open");
  document.body.style.overflow = "";
  setTimeout(() => { $lbContent.innerHTML = ""; }, 400);
}
function showLightboxItem() {
  const file = lightboxFiles[lightboxIndex];
  $lbContent.innerHTML = "";
  if (file.t === "V") {
    const iframe = document.createElement("iframe");
    iframe.src = videoPreview(file.id);
    iframe.allow = "autoplay";
    iframe.setAttribute("allowfullscreen","");
    $lbContent.appendChild(iframe);
  } else {
    const img = document.createElement("img");
    img.src = thumb(file.id, 1920); img.alt = "";
    $lbContent.appendChild(img);
  }
  $lbCounter.textContent = `${lightboxIndex+1} / ${lightboxFiles.length}`;
}
function lightboxPrev() { lightboxIndex = (lightboxIndex-1+lightboxFiles.length)%lightboxFiles.length; showLightboxItem(); }
function lightboxNext() { lightboxIndex = (lightboxIndex+1)%lightboxFiles.length; showLightboxItem(); }

document.getElementById("lbClose").addEventListener("click", closeLightbox);
document.getElementById("lbPrev").addEventListener("click", lightboxPrev);
document.getElementById("lbNext").addEventListener("click", lightboxNext);
$lightbox.addEventListener("click", e => { if(e.target===$lightbox) closeLightbox(); });
document.addEventListener("keydown", e => {
  if(!$lightbox.classList.contains("open")) return;
  if(e.key==="Escape") closeLightbox();
  if(e.key==="ArrowLeft") lightboxPrev();
  if(e.key==="ArrowRight") lightboxNext();
});

(function init() {
  const saved = localStorage.getItem("theme");
  if (saved === "dark") document.documentElement.classList.add("dark");
  renderDotMatrix();
  renderGlassBar();
  renderCities();
  renderMapPins();
})();
